name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "unit-tests/**"
      - "pintos/devices/timer.c"
      - ".github/workflows/unit-tests.yml"

jobs:
  unit-tests:
    name: unit-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python unit-tests/run_local.py
